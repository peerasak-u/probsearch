            keywordsLabel: document.getElementById('keywords-label'),
            keywordsList: document.getElementById('keywords-list'),
            toggleQuery: document.getElementById('toggle-query'),
            queryLabel: document.getElementById('query-label'),
            charCount: document.getElementById('char-count'),
            chevronIcon: document.getElementById('chevron-icon'),
            queryBlock: document.getElementById('query-block'),
            queryText: document.getElementById('query-text'),
            searchBtn: document.getElementById('search-btn'),
            btnText: document.getElementById('btn-text'),
            footerLink: document.getElementById('footer-link')
        };

        // Update UI language
        function updateLanguage(lang) {
            currentLang = lang;
            document.body.lang = lang;
            const t = TRANSLATIONS[lang];

            // Update language buttons
            if (lang === 'en') {
                els.langEn.className = 'text-sm font-semibold text-orange-500 hover:text-orange-600 transition';
                els.langTh.className = 'text-sm font-medium text-stone-500 hover:text-orange-500 transition';
            } else {
                els.langEn.className = 'text-sm font-medium text-stone-500 hover:text-orange-500 transition';
                els.langTh.className = 'text-sm font-semibold text-orange-500 hover:text-orange-600 transition';
            }

            // Update text content
            els.mainTitle.textContent = t.title;
            els.subtitle.textContent = t.subtitle;
            els.topicLabel.textContent = t.topicLabel;
            els.topicInput.placeholder = t.topicPlaceholder;
            els.platformLabel.textContent = t.platformLabel;
            els.timeLabel.textContent = t.timeLabel;
            els.labelAnytime.textContent = t.labelAnytime;
            els.labelHour.textContent = t.labelHour;
            els.labelDay.textContent = t.labelDay;
            els.labelWeek.textContent = t.labelWeek;
            els.labelMonth.textContent = t.labelMonth;
            els.labelYear.textContent = t.labelYear;
            els.labelCustom.textContent = t.labelCustom;
            els.labelFrom.textContent = t.labelFrom;
            els.labelTo.textContent = t.labelTo;
            els.intentLabel.textContent = t.intentLabel;
            els.labelPain.textContent = t.labelPain;
            els.labelQuestions.textContent = t.labelQuestions;
            els.labelExp.textContent = t.labelExp;
            els.labelAdvice.textContent = t.labelAdvice;
            els.keywordsLabel.textContent = t.keywordsLabel;
            els.queryLabel.textContent = t.queryLabel;
            els.btnText.textContent = t.btnText;
            els.footerLink.textContent = t.footerLink;

            updateQuery();
            updateKeywords();
        }

        // Build search query
        function buildQuery() {
            const topic = els.topicInput.value.trim();
            if (!topic) return '';

            const parts = [];
            parts.push(`site:${selectedPlatform}`);

            // URL path filter for Reddit
            if (selectedPlatform === 'reddit.com') {
                parts.push('(inurl:comments | inurl:thread)');
            }

            // Topic keyword
            parts.push(`(intext:"${topic}")`);

            // Intent filters
            const patterns = INTENT_PATTERNS[currentLang];
            const selectedPatterns = [];
            selectedIntents.forEach(intent => {
                if (patterns[intent]) {
                    selectedPatterns.push(...patterns[intent]);
                }
            });

            if (selectedPatterns.length > 0) {
                const intentQuery = selectedPatterns.map(p => `intext:"${p}"`).join(' | ');
                parts.push(`(${intentQuery})`);
            }

            return parts.join(' ');
        }

        // Build search URL with time range
        function buildSearchUrl() {
            const query = buildQuery();
            if (!query) return '';

            const params = new URLSearchParams();
            params.set('q', query);

            // Add time range parameter if selected
            if (selectedTimeRange === 'custom' && customDateRange.from && customDateRange.to) {
                // Custom date range: cdr:1,cd_min:MM/DD/YYYY,cd_max:MM/DD/YYYY
                const fromParts = customDateRange.from.split('-');
                const toParts = customDateRange.to.split('-');
                const cdMin = `${fromParts[1]}/${fromParts[2]}/${fromParts[0]}`;
                const cdMax = `${toParts[1]}/${toParts[2]}/${toParts[0]}`;
                params.set('tbs', `cdr:1,cd_min:${cdMin},cd_max:${cdMax}`);
            } else if (selectedTimeRange) {
                params.set('tbs', `qdr:${selectedTimeRange}`);
            }

            return `https://www.google.com/search?${params.toString()}`;
        }

        // Update query display
        function updateQuery() {
            const query = buildQuery();
            const url = buildSearchUrl();
            if (query) {
                els.queryText.textContent = url;
                els.charCount.textContent = `${query.length} chars`;
                els.searchBtn.disabled = false;
            } else {
                els.queryText.textContent = TRANSLATIONS[currentLang].emptyQuery;
                els.charCount.textContent = '0 chars';
                els.searchBtn.disabled = true;
            }
        }

        // Update keywords display
        function updateKeywords() {
            if (selectedIntents.length === 0) {
                els.keywordsSection.classList.add('hidden');
                return;
            }

            const patterns = INTENT_PATTERNS[currentLang];
            const keywords = [];
            selectedIntents.forEach(intent => {
                if (patterns[intent]) {
                    keywords.push(...patterns[intent]);
                }
            });

            if (keywords.length === 0) {
                els.keywordsSection.classList.add('hidden');
                return;
            }

            els.keywordsSection.classList.remove('hidden');
            els.keywordsList.innerHTML = keywords.map(k =>
                `<span class="inline-block px-2 py-1 bg-stone-100 text-stone-600 text-xs rounded-md">${k}</span>`
            ).join('');
        }

        // Event Listeners
        els.langEn.addEventListener('click', () => updateLanguage('en'));
        els.langTh.addEventListener('click', () => updateLanguage('th'));

        els.topicInput.addEventListener('input', () => {
            updateQuery();
            updateKeywords();
        });

        // Platform pills
        els.platformPills.forEach(pill => {
            pill.addEventListener('click', () => {
                els.platformPills.forEach(p => {
                    p.classList.remove('toggle-active');
                    p.classList.add('pill-inactive');
                });
                pill.classList.remove('pill-inactive');
                pill.classList.add('toggle-active');
                selectedPlatform = pill.dataset.platform;
                updateQuery();
            });
        });

        // Time range pills
        els.timePills.forEach(pill => {
            pill.addEventListener('click', () => {
                els.timePills.forEach(p => {
                    p.classList.remove('toggle-active');
                    p.classList.add('pill-inactive');
                });
                pill.classList.remove('pill-inactive');
                pill.classList.add('toggle-active');
                selectedTimeRange = pill.dataset.time;

                // Show/hide custom date section
                if (selectedTimeRange === 'custom') {
                    els.customDateSection.classList.remove('hidden');
                } else {
                    els.customDateSection.classList.add('hidden');
                }

                updateQuery();
            });
        });

        // Custom date inputs
        els.dateFrom.addEventListener('change', (e) => {
            customDateRange.from = e.target.value;
            updateQuery();
        });

        els.dateTo.addEventListener('change', (e) => {
            customDateRange.to = e.target.value;
            updateQuery();
        });

        // Intent toggles
        els.intentToggles.forEach(toggle => {
            toggle.addEventListener('click', () => {
                const intent = toggle.dataset.intent;
                if (selectedIntents.includes(intent)) {
                    selectedIntents = selectedIntents.filter(i => i !== intent);
                    toggle.classList.remove('toggle-active');
                    toggle.classList.add('toggle-inactive');
                } else {
                    selectedIntents.push(intent);
                    toggle.classList.remove('toggle-inactive');
                    toggle.classList.add('toggle-active');
                }
                updateQuery();
                updateKeywords();
            });
        });

        // Toggle query visibility
        els.toggleQuery.addEventListener('click', () => {
            queryVisible = !queryVisible;
            if (queryVisible) {
                els.queryBlock.classList.remove('hidden');
                els.chevronIcon.style.transform = 'rotate(180deg)';
            } else {
                els.queryBlock.classList.add('hidden');
                els.chevronIcon.style.transform = 'rotate(0deg)';
            }
        });

        // Search button
        els.searchBtn.addEventListener('click', () => {
            const url = buildSearchUrl();
            if (url) {
                window.open(url, '_blank');
            }
        });

        // Initialize
        updateLanguage('th');
        updateQuery();
        updateKeywords();
    </script>
</body>
</html>
